name: CI Self-Hosted

on:
  workflow_dispatch:
    inputs:
      module:
        description: "Module to run on self-hosted"
        required: true
        default: "visualization"
        type: choice
        options:
          - data_load
          - data_quality_analysis
          - data_research
          - visualization

permissions:
  contents: read

jobs:
  run-self-hosted:
    runs-on: [self-hosted, macOS, ARM64]
    env:
      MODULE: ${{ inputs.module }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show Python version
        run: |
          python3 --version
          python3 -m pip --version

      - name: Create virtual environment
        run: |
          set -euo pipefail
          python3 -m venv .venv-ci
          .venv-ci/bin/python -m pip --version

      - name: Install dependencies
        run: |
          set -euo pipefail
          .venv-ci/bin/python -m pip install --upgrade pip
          .venv-ci/bin/python -m pip install -r visualization/requirements.txt
          .venv-ci/bin/python -m pip install -r web/requirements.txt

      - name: Run selected module
        run: |
          set -euo pipefail
          mkdir -p artifacts/${MODULE}/work

          export WORK_DIR="$PWD/artifacts/${MODULE}/work"
          export DB_PATH="$WORK_DIR/db/air_quality.db"
          export REPORTS_DIR="$WORK_DIR/reports"
          export PLOTS_DIR="$WORK_DIR/plots"
          export CSV_PATH="$PWD/data/dataset.csv"

          .venv-ci/bin/python data_load/app.py | tee "artifacts/${MODULE}/data_load.log"

          if [ "${MODULE}" != "data_load" ]; then
            .venv-ci/bin/python "${MODULE}/app.py" | tee "artifacts/${MODULE}/${MODULE}.log"
          fi

      - name: Collect generated outputs
        run: |
          set -euo pipefail
          if [ -d "artifacts/${MODULE}/work/reports" ]; then
            cp -R "artifacts/${MODULE}/work/reports" "artifacts/${MODULE}/reports"
          fi
          if [ -d "artifacts/${MODULE}/work/plots" ]; then
            cp -R "artifacts/${MODULE}/work/plots" "artifacts/${MODULE}/plots"
          fi

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: artifacts-selfhosted-${{ inputs.module }}-${{ github.run_id }}
          path: artifacts/${{ inputs.module }}
          retention-days: 14
