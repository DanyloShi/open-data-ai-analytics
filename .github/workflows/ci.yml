name: CI Modules

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:
    inputs:
      module:
        description: "Which module to run (or all)"
        required: true
        default: "all"
        type: choice
        options:
          - all
          - data_load
          - data_quality_analysis
          - data_research
          - visualization

permissions:
  contents: read

jobs:
  run-modules:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        module: [data_load, data_quality_analysis, data_research, visualization]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: |
            visualization/requirements.txt
            web/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r visualization/requirements.txt
          python -m pip install -r web/requirements.txt

      - name: Run selected module pipeline
        if: ${{ github.event_name != 'workflow_dispatch' || github.event.inputs.module == 'all' || github.event.inputs.module == matrix.module }}
        env:
          MODULE: ${{ matrix.module }}
        run: |
          set -euo pipefail
          mkdir -p artifacts/${MODULE}/work

          export WORK_DIR="$PWD/artifacts/${MODULE}/work"
          export DB_PATH="$WORK_DIR/db/air_quality.db"
          export REPORTS_DIR="$WORK_DIR/reports"
          export PLOTS_DIR="$WORK_DIR/plots"
          export CSV_PATH="$PWD/data/dataset.csv"

          python data_load/app.py | tee "artifacts/${MODULE}/data_load.log"

          if [ "${MODULE}" != "data_load" ]; then
            python "${MODULE}/app.py" | tee "artifacts/${MODULE}/${MODULE}.log"
          fi

      - name: Collect generated outputs
        if: ${{ github.event_name != 'workflow_dispatch' || github.event.inputs.module == 'all' || github.event.inputs.module == matrix.module }}
        env:
          MODULE: ${{ matrix.module }}
        run: |
          set -euo pipefail
          if [ -d "artifacts/${MODULE}/work/reports" ]; then
            cp -R "artifacts/${MODULE}/work/reports" "artifacts/${MODULE}/reports"
          fi
          if [ -d "artifacts/${MODULE}/work/plots" ]; then
            cp -R "artifacts/${MODULE}/work/plots" "artifacts/${MODULE}/plots"
          fi

      - name: Upload artifacts
        if: ${{ github.event_name != 'workflow_dispatch' || github.event.inputs.module == 'all' || github.event.inputs.module == matrix.module }}
        uses: actions/upload-artifact@v4
        with:
          name: artifacts-${{ matrix.module }}-${{ github.run_id }}
          path: artifacts/${{ matrix.module }}
          retention-days: 14
